name: 'Publish Factory to ElasticClaw Hub'
description: 'Push a single factory definition to an ElasticClaw hub'
author: 'Marc Campbell <marc.e.campbell@gmail.com>'
inputs:
  hub-endpoint:
    description: 'ElasticClaw hub URL (e.g., https://hub.elasticclaw.dev)'
    required: true
  token:
    description: 'ElasticClaw hub API token'
    required: true
  path:
    description: 'Path to the factory YAML/JSON file'
    required: true
  dry-run:
    description: 'Validate only, do not push'
    required: false
    default: 'false'
outputs:
  name:
    description: 'Factory name that was pushed'
  pushed:
    description: 'Whether the factory was actually pushed (false if dry-run)'
runs:
  using: 'node20'
  main: 'dist/index.js'
